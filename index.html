<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>我的履歷</title>

<style>
body {
    font-family: Arial;
    margin: 40px;
    background: #f5f5f5;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 500px;
    margin: auto;
}

.btn {
    display: inline-block;
    margin-bottom: 20px;
    padding: 8px 12px;
    background: #333;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}

button {
    margin-top: 10px;
    padding: 8px 12px;
    background: #444;
    color: white;
    border: none;
    border-radius: 5px;
}
</style>
</head>

<body>

<a href="korean.html" class="btn">👉 韓系版本</a>

<img src="images/meee.jpg" style="width:200px;border-radius:50%;">

<audio id="bgm" loop>
    <source src="music/happy-song.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleMusic()">🎵 音樂</button>

<div class="container">
    <h1>個人履歷</h1>
    <p><strong>姓名：</strong>謝羽喬</p>
    <p><strong>學校：</strong>亞洲大學</p>
    <p><strong>學號：</strong>114022105</p>

    <h2>自我介紹</h2>
    <p>我是亞洲大學的學生，對學習新技術充滿熱情。</p>

    <h2>技能</h2>
    <ul>
        <li>打遊戲罵隊友不帶髒字</li>
        <li>睡覺只睡三小時就開機</li>
        <li>跌倒了就躺好</li>
    </ul>

    <button onclick="sayHi()">點我</button>

    <p style="font-size:12px;color:#aaa;margin-top:20px;">
🎵 Music: Advertising - Scandinavianz
</p>

</div>

<script>
let audio = document.getElementById("bgm");
audio.volume = 0;

function sayHi(){
    alert("你好！歡迎來看我的履歷！");
}

function fadeIn() {
    let vol = 0;
    audio.play();
    let fade = setInterval(() => {
        if (vol < 1) {
            vol += 0.05;
            audio.volume = vol;
        } else {
            clearInterval(fade);
        }
    }, 100);
}

function fadeOut() {
    let vol = audio.volume;
    let fade = setInterval(() => {
        if (vol > 0) {
            vol -= 0.05;
            audio.volume = vol;
        } else {
            audio.pause();
            clearInterval(fade);
        }
    }, 100);
}

function toggleMusic(){
    if(audio.paused){
        fadeIn();
    } else {
        fadeOut();
    }
}
</script>

</body>
</html>
