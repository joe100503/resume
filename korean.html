<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>My Resume</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f9f9f9, #e8ecf1);
}

/* 卡片 */
.card {
    max-width: 420px;
    margin: 80px auto;
    background: white;
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* 頭像 */
.profile-img {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #eee;
}

/* 名字 */
h1 {
    margin: 15px 0 5px;
    font-size: 26px;
}

/* 副標 */
.subtitle {
    color: gray;
    margin-bottom: 10px;
}

/* 學號 */
.id {
    margin: 10px 0;
    font-weight: bold;
}

/* 分隔線 */
.line {
    width: 40px;
    height: 3px;
    background: black;
    margin: 15px auto;
}

/* 技能區 */
.skills {
    margin-top: 20px;
}

/* 技能標籤 */
.skill {
    display: inline-block;
    background: #f1f3f6;
    padding: 8px 12px;
    border-radius: 20px;
    margin: 5px;
    font-size: 14px;
}

/* 按鈕 */
button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    background: black;
    color: white;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #333;
}
</style>
</head>

<body>

<div class="card">
    <img src="images/meee.jpg" class="profile-img">

    <h1>謝羽喬</h1>
    <div class="subtitle">亞洲大學</div>
    <div class="id">學號：114022105</div>

    <div class="line"></div>

    <div class="skills">
        <div class="skill">打遊戲罵隊友不帶髒字</div>
        <div class="skill">睡覺只睡三小時就開機</div>
        <div class="skill">跌倒了就躺好</div>
    </div>

    <button onclick="hi()">Contact Me</button>
</div>

<script>
function hi(){
    alert("你好！歡迎聯絡我 💖");
}
</script>

</body>
</html>
